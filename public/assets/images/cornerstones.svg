<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 40 720 420" role="img" aria-labelledby="cs-t cs-d">
  <title id="cs-t">The Four Cornerstones of an App Fair App</title>
  <desc id="cs-d">A 2×2 grid: Transparent (with the four software freedoms), Ubiquitous (iOS and Android), Global (Greek, Latin, CJK, and Arabic/Hebrew scripts), Accessible (sight, hearing, motion, and understanding).</desc>
  <style><![CDATA[
    .lbl  { font-family: "Inter", -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif; font-size: 22px; font-weight: 700; letter-spacing: -0.01em; }
    .sub  { font-family: "Inter", -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif; font-size: 12px; font-weight: 500; letter-spacing: 0.04em; }
    .t-c { fill: #0284c7; } .u-c { fill: #4f46e5; } .g-c { fill: #16a34a; } .a-c { fill: #ea580c; }
    .t-l { fill: #075985; } .u-l { fill: #3730a3; } .g-l { fill: #14532d; } .a-l { fill: #9a3412; }

    /* ── Generic chip styling. Each chip's parent <g> sets --c (the tint). ── */
    .chip-tile  { fill: var(--c); fill-opacity: 0.18; stroke: var(--c); stroke-opacity: 0.55; stroke-width: 1; }
    .chip-icon  { fill: var(--c); }
    .chip-glyph { fill: var(--c); font-family: "Inter", "Noto Sans", -apple-system, BlinkMacSystemFont, sans-serif; font-size: 22px; font-weight: 700; text-anchor: middle; dominant-baseline: central; }

    /* Each cornerstone's four sub-block tints form a rainbow gradient that
       sits inside its parent's hue zone, harmonising with the surrounding
       card colour and reading visually as a smooth left-to-right,
       top-to-bottom progression (TL → TR → BL → BR). */

    /* ── Transparent (sky parent) → cyan · sky · blue · indigo ── */
    .f-use     { --c: #06b6d4; }  /* cyan-500   */
    .f-study   { --c: #0ea5e9; }  /* sky-500    */
    .f-copy    { --c: #3b82f6; }  /* blue-500   */
    .f-improve { --c: #6366f1; }  /* indigo-500 */

    /* ── Ubiquitous (indigo parent) → indigo · violet · purple · fuchsia ── */
    .u-phone   { --c: #6366f1; }  /* indigo-500  */
    .u-tablet  { --c: #8b5cf6; }  /* violet-500  */
    .u-watch   { --c: #a855f7; }  /* purple-500  */
    .u-desktop { --c: #d946ef; }  /* fuchsia-500 */

    /* ── Global (green parent) → teal · emerald · green · lime ── */
    .g-greek   { --c: #14b8a6; }  /* teal-500    */
    .g-latin   { --c: #10b981; }  /* emerald-500 */
    .g-cjk     { --c: #22c55e; }  /* green-500   */
    .g-arabic  { --c: #84cc16; }  /* lime-500    */

    /* ── Accessible (orange parent) → amber · orange · red · rose ── */
    .a-sight    { --c: #f59e0b; }  /* amber-500  */
    .a-hearing  { --c: #f97316; }  /* orange-500 */
    .a-motion   { --c: #ef4444; }  /* red-500    */
    .a-mind     { --c: #f43f5e; }  /* rose-500   */

    @media (prefers-color-scheme: dark) {
      .t-c { fill: #38bdf8; } .u-c { fill: #818cf8; } .g-c { fill: #4ade80; } .a-c { fill: #fb923c; }
      .t-l { fill: #bae6fd; } .u-l { fill: #c7d2fe; } .g-l { fill: #bbf7d0; } .a-l { fill: #fed7aa; }
      /* Same rainbow flows, shifted to lighter (300-level) tints for legibility
         over the dark page background. */
      .f-use     { --c: #22d3ee; }  /* cyan-400   */
      .f-study   { --c: #38bdf8; }  /* sky-400    */
      .f-copy    { --c: #60a5fa; }  /* blue-400   */
      .f-improve { --c: #818cf8; }  /* indigo-400 */
      .u-phone   { --c: #a5b4fc; }  /* indigo-300  */
      .u-tablet  { --c: #c4b5fd; }  /* violet-300  */
      .u-watch   { --c: #d8b4fe; }  /* purple-300  */
      .u-desktop { --c: #f0abfc; }  /* fuchsia-300 */
      .g-greek   { --c: #5eead4; }  /* teal-300    */
      .g-latin   { --c: #6ee7b7; }  /* emerald-300 */
      .g-cjk     { --c: #86efac; }  /* green-300   */
      .g-arabic  { --c: #bef264; }  /* lime-300    */
      .a-sight    { --c: #fcd34d; }  /* amber-300  */
      .a-hearing  { --c: #fdba74; }  /* orange-300 */
      .a-motion   { --c: #fca5a5; }  /* red-300    */
      .a-mind     { --c: #fda4af; }  /* rose-300   */
    }
  ]]></style>

  <!-- Background is intentionally transparent so the page's active light/dark
       theme shows through behind the four tinted cards. -->

  <!-- ════════════════════════════════════════════════════════
       Top-left: Transparent — with the Four Software Freedoms
       ════════════════════════════════════════════════════════ -->
